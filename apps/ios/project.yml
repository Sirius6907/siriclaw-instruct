name: SiriClaw-Instruct
options:
  bundleIdPrefix: ai.SiriClaw-Instruct
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  siriclaw-instruct-kit:
    path: ../shared/siriclaw-instruct-kit
  Swabble:
    path: ../../Swabble

schemes:
  SiriClaw-Instruct:
    shared: true
    build:
      targets:
        SiriClaw-Instruct: all
    test:
      targets:
        - SiriClaw-InstructTests

targets:
  SiriClaw-Instruct:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: SiriClaw-InstructShareExtension
        embed: true
      - target: SiriClaw-InstructActivityWidget
        embed: true
      - target: SiriClaw-InstructWatchApp
      - package: siriclaw-instruct-kit
      - package: siriclaw-instruct-kit
        product: SiriClaw-InstructChatUI
      - package: siriclaw-instruct-kit
        product: SiriClaw-InstructProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/SiriClaw-Instruct.entitlements
        CODE_SIGN_STYLE: "$(SiriClaw-Instruct_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SiriClaw-Instruct_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(SiriClaw-Instruct_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(SiriClaw-Instruct_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: SiriClaw-Instruct
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.SiriClaw-Instruct.ios
            CFBundleURLSchemes:
              - SiriClaw-Instruct
        CFBundleShortVersionString: "2026.3.8"
        CFBundleVersion: "20260308"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.SiriClaw-Instruct.ios.bgrefresh
        NSLocalNetworkUsageDescription: SiriClaw-Instruct discovers and connects to your SiriClaw-Instruct gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _SiriClaw-Instruct-gw._tcp
        NSCameraUsageDescription: SiriClaw-Instruct can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: SiriClaw-Instruct uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: SiriClaw-Instruct can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: SiriClaw-Instruct needs microphone access for voice wake.
        NSSpeechRecognitionUsageDescription: SiriClaw-Instruct uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  SiriClaw-InstructShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: siriclaw-instruct-kit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SiriClaw-Instruct_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SiriClaw-Instruct_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(SiriClaw-Instruct_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(SiriClaw-Instruct_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: SiriClaw-Instruct Share
        CFBundleShortVersionString: "2026.3.8"
        CFBundleVersion: "20260308"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  SiriClaw-InstructActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/SiriClaw-InstructActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SiriClaw-Instruct_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SiriClaw-Instruct_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(SiriClaw-Instruct_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: SiriClaw-Instruct Activity
        CFBundleShortVersionString: "2026.3.8"
        CFBundleVersion: "20260308"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  SiriClaw-InstructWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: SiriClaw-InstructWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(SiriClaw-Instruct_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: SiriClaw-Instruct
        CFBundleShortVersionString: "2026.3.8"
        CFBundleVersion: "20260308"
        WKCompanionAppBundleIdentifier: "$(SiriClaw-Instruct_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  SiriClaw-InstructWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(SiriClaw-Instruct_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: SiriClaw-Instruct
        CFBundleShortVersionString: "2026.3.8"
        CFBundleVersion: "20260308"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(SiriClaw-Instruct_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  SiriClaw-InstructTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
    dependencies:
      - target: SiriClaw-Instruct
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SiriClaw-Instruct_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SiriClaw-Instruct_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.SiriClaw-Instruct.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SiriClaw-Instruct.app/SiriClaw-Instruct"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: SiriClaw-InstructTests
        CFBundleShortVersionString: "2026.3.8"
        CFBundleVersion: "20260308"


