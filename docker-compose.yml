services:
  siriclaw-instruct-gateway:
    image: ${SIRICLAW_IMAGE:-siriclaw-instruct:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      SIRICLAW_GATEWAY_TOKEN: ${SIRICLAW_GATEWAY_TOKEN:-}
      SIRICLAW_ALLOW_INSECURE_PRIVATE_WS: ${SIRICLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${SIRICLAW_CONFIG_DIR}:/home/node/.SiriClaw-Instruct
      - ${SIRICLAW_WORKSPACE_DIR}:/home/node/.SiriClaw-Instruct/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg SIRICLAW_INSTALL_DOCKER_CLI=1) or use
      ## docker-setup.sh with SIRICLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${SIRICLAW_GATEWAY_PORT:-18789}:18789"
      - "${SIRICLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "siriclaw-instruct.mjs",
        "gateway",
        "--allow-unconfigured",
        "--bind",
        "${SIRICLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  siriclaw-instruct-cli:
    image: ${SIRICLAW_IMAGE:-siriclaw-instruct:local}
    network_mode: "service:siriclaw-instruct-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      SIRICLAW_GATEWAY_TOKEN: ${SIRICLAW_GATEWAY_TOKEN:-}
      SIRICLAW_ALLOW_INSECURE_PRIVATE_WS: ${SIRICLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${SIRICLAW_CONFIG_DIR}:/home/node/.SiriClaw-Instruct
      - ${SIRICLAW_WORKSPACE_DIR}:/home/node/.SiriClaw-Instruct/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "siriclaw-instruct.mjs"]
    depends_on:
      - siriclaw-instruct-gateway
